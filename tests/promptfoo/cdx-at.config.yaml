# promptfoo POC config — port of plugins/cdx-at/acceptance/e2e/cdx-at-search.yaml
#
# Goal: replace the custom test runner under `tests/test-plugin-e2e.py`
# with promptfoo as the framework, while keeping the deterministic
# assertion style (regex on response, structural tool_call check,
# state-via-GraphQL for side effects). No LLM judging.
#
# Run from repo root after exporting CDX_EVAL_AUTH_TOKEN:
#   npx promptfoo eval -c tests/promptfoo/cdx-at.config.yaml

description: cdx-at search — Austrian RIS, OGH damages + ABGB lookup

providers:
  - id: file://tests/promptfoo/provider.py
    label: cdx-daemon
    config: {}

# Each test row drives one prompt. The provider opens a fresh chat per row.
# tool_calls_max is a "did the AI actually use the right tool" signal,
# not a budget knob. A healthy `cdx-at search` is ~1-2 calls plus skill
# loads (excluded). If we see >8 work calls, the AI almost certainly
# fell back to curl/scraping — which is a real failure mode worth
# catching even when the response regex happens to pass.

tests:
  - description: OGH-Schadenersatz search returns real ATJD URLs
    vars:
      tool_name: shell
      input_regex: 'cdx-at[\s"\\]+search'
      tool_calls_max: 8
    options:
      prompt: "Najdi mi 3 rozhodnutí rakouského Nejvyššího soudu (OGH) o náhradě škody (Schadenersatz)."
    assert:
      # Structural — the AI actually invoked cdx-at, not just hallucinated.
      - type: python
        value: file://tests/promptfoo/assertions.py:assert_tool_call
      - type: python
        value: file://tests/promptfoo/assertions.py:assert_tool_count_max
      # Surface — real ATJD doc URLs in the reply prove real hits.
      - type: regex
        value: '/doc/ATJD\d+'

  - description: ABGB (Austrian civil code) lookup returns ATBR/ATHI doc
    vars:
      tool_name: shell
      input_regex: 'cdx-at'
      tool_calls_max: 8
    options:
      prompt: "Najdi mi rakouský občanský zákoník (ABGB)."
    assert:
      - type: python
        value: file://tests/promptfoo/assertions.py:assert_tool_call
      - type: python
        value: file://tests/promptfoo/assertions.py:assert_tool_count_max
      - type: regex
        value: '/doc/(ATBR|ATHI)\d+'
