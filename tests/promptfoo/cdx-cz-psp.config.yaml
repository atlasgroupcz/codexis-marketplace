# Port of plugins/cdx-cz-psp/acceptance/e2e/cdx-cz-psp-search.yaml
# Czech parliamentary docs (psp.cz) — interpellations + bill proposals.

description: cdx-cz-psp — Czech parliament document search

prompts:
  - "{{ prompt }}"

providers:
  - id: file://./provider.py
    label: cdx-daemon
    config: {}

tests:
  - description: Tax-interpellation search returns CZPSPDOK doc URLs
    vars:
      # "3 dokumenty, krátký seznam stačí" mirrors cdx-at's first prompt —
      # it tells the AI to stop searching after a small focused result set
      # instead of iteratively narrowing across the whole CZPSPDOK index.
      # With this framing the healthy run is ~2 work calls; cap of 8 gives
      # 4× headroom while keeping the cascade-detection signal sharp.
      prompt: "Najdi mi 3 parlamentní dokumenty k interpelacím o daních. Krátký seznam stačí."
      tool_name: shell
      input_regex: 'cdx-cz-psp[\s"\\]+search\s+CZPSP[A-Z]+(?!.*--help)'
      tool_calls_max: 8
      forbidden_regex: '(curl|wget|requests\.get|urllib\.request|psp\.cz)'
      # Arbitration criteria (read only by `run.py --arbitrate` when a
      # deterministic check above fails): legitimate vs illegitimate behavior.
      arbitration:
        correct:
          - "A single curl/HEAD against a CZPSP doc URL that cdx-cz-psp itself returned, only to confirm it resolves."
        incorrect:
          - "Using curl/wget/requests to fetch parliamentary documents from psp.cz instead of cdx-cz-psp."
          - "Bypassing cdx-cz-psp to scrape psp.cz for the records."
    assert:
      - type: python
        value: file://./assertions.py:assert_tool_call
      - type: python
        value: file://./assertions.py:assert_tool_count_max
      - type: python
        value: file://./assertions.py:assert_no_tool_call
      - type: regex
        value: '/doc/CZPSPDOK\d+'
