# Port of plugins/codexis/acceptance/e2e/cdxctl-tabular.yaml
# cdxctl tabular extraction workflow: add column → start → wait until DONE →
# read results. Uses ONE small fixture file + ONE column so the backend AI
# extraction finishes quickly. Setup uploads the fixture before the chat.

description: codexis cdxctl — tabular extraction (add → start → results)
target_plugin: codexis

setup:
  - upload:
      destination: /home/codexis/ee-tab-{{ run_id }}
      files:
        - path: invoice.txt
          content: "Customer: John Doe. Invoice total: $250. Paid in full.\n"

prompts:
  - "{{ prompt }}"

providers:
  - id: file://./provider.py
    label: cdx-daemon
    config: {}

tests:
  - description: tabular add-column registers `customer` in DRAFT state
    vars:
      prompt: "Pomocí cdxctl: v /home/codexis/ee-tab-{{ run_id }} mám faktury. Přes `cdxctl tabular add-column` přidej sloupec 'customer' — celé jméno zákazníka z faktury. Extrakci zatím nespouštěj, to řeknu potom."
      tool_name: shell
      input_regex: 'tabular\s+add-column'
      tool_calls_min: 1
      # high-variance exploration; includes occasional spawn_agent.
      tool_calls_max: 13
      forbidden_regex: '(curl|wget|requests\.get|urllib\.request|http://localhost:8086)'
      # Arbitration criteria (read only by `run.py --arbitrate` when a
      # deterministic check above fails): legitimate vs illegitimate behavior.
      arbitration:
        correct:
          - "Performing the requested registry operation through the cdxctl CLI (agent/skill/automation/notification/marketplace/plugin/tabular subcommands), including reading or writing the local files the workflow needs."
        incorrect:
          - "Bypassing cdxctl to call the daemon API directly via curl/wget/requests to http://localhost:8086."
          - "Creating, updating or deleting daemon state by any route other than cdxctl."
      graphql: 'query($id: ID!){ tabularExtraction(id: $id) { columns { name } status } }'
      variables:
        id: "${TabularExtraction:/home/codexis/ee-tab-{{ run_id }}}"
      jsonpath: "$.tabularExtraction.columns[*].name"
      contains: "customer"
    assert:
      - type: python
        value: file://./assertions.py:assert_tool_call
      - type: python
        value: file://./assertions.py:assert_tool_count_min
      - type: python
        value: file://./assertions.py:assert_tool_count_max
      - type: python
        value: file://./assertions.py:assert_no_tool_call
      - type: python
        value: file://./assertions.py:assert_state_graphql

  - description: tabular start runs to DONE
    vars:
      prompt: "Pomocí cdxctl spusť extrakci (`cdxctl tabular start`) nad /home/codexis/ee-tab-{{ run_id }} a počkej, až bude hotová. Řekni mi, až bude DONE."
      tool_name: shell
      # shell form or Python list form.
      input_regex: 'tabular[^a-z]+start'
      tool_calls_min: 1
      tool_calls_max: 8
      forbidden_regex: '(curl|wget|requests\.get|urllib\.request|http://localhost:8086)'
      # Arbitration criteria (read only by `run.py --arbitrate` when a
      # deterministic check above fails): legitimate vs illegitimate behavior.
      arbitration:
        correct:
          - "Performing the requested registry operation through the cdxctl CLI (agent/skill/automation/notification/marketplace/plugin/tabular subcommands), including reading or writing the local files the workflow needs."
        incorrect:
          - "Bypassing cdxctl to call the daemon API directly via curl/wget/requests to http://localhost:8086."
          - "Creating, updating or deleting daemon state by any route other than cdxctl."
      graphql: 'query($id: ID!){ tabularExtraction(id: $id) { status progress { totalFiles extractedFiles } } }'
      variables:
        id: "${TabularExtraction:/home/codexis/ee-tab-{{ run_id }}}"
      jsonpath: "$.tabularExtraction.status"
      equals: "DONE"
    assert:
      - type: python
        value: file://./assertions.py:assert_tool_call
      - type: python
        value: file://./assertions.py:assert_tool_count_min
      - type: python
        value: file://./assertions.py:assert_tool_count_max
      - type: python
        value: file://./assertions.py:assert_no_tool_call
      - type: python
        value: file://./assertions.py:assert_state_graphql

  - description: tabular results — AI relays the extracted customer name
    vars:
      prompt: "Pomocí `cdxctl tabular results` ukaž mi výsledky extrakce /home/codexis/ee-tab-{{ run_id }} — jaká hodnota vyšla ve sloupci customer?"
      tool_name: shell
      input_regex: 'tabular\s+results'
      tool_calls_min: 1
      tool_calls_max: 8
      forbidden_regex: '(curl|wget|requests\.get|urllib\.request|http://localhost:8086)'
      # Arbitration criteria (read only by `run.py --arbitrate` when a
      # deterministic check above fails): legitimate vs illegitimate behavior.
      arbitration:
        correct:
          - "Performing the requested registry operation through the cdxctl CLI (agent/skill/automation/notification/marketplace/plugin/tabular subcommands), including reading or writing the local files the workflow needs."
        incorrect:
          - "Bypassing cdxctl to call the daemon API directly via curl/wget/requests to http://localhost:8086."
          - "Creating, updating or deleting daemon state by any route other than cdxctl."
      graphql: 'query($id: ID!){ tabularExtraction(id: $id) { rows { fileName status } } }'
      variables:
        id: "${TabularExtraction:/home/codexis/ee-tab-{{ run_id }}}"
      jsonpath: "$.tabularExtraction.rows[*].status"
      # cdxctl returned rows; extraction backend may flake on specific files.
      matches: 'DONE|ERROR'
    assert:
      - type: python
        value: file://./assertions.py:assert_tool_call
      - type: python
        value: file://./assertions.py:assert_tool_count_min
      - type: python
        value: file://./assertions.py:assert_tool_count_max
      - type: python
        value: file://./assertions.py:assert_no_tool_call
      - type: python
        value: file://./assertions.py:assert_state_graphql
      # Surface — AI must mention the extracted customer name.
      - type: regex
        value: '[Jj]ohn'
