# Half of the legacy `cdx-sk-search.yaml` — case-law search via SKNUS.
# Split per-test so the orchestrator parallelizes case-law search and
# §3 OZ lookup. See ares-ico.config.yaml for the rationale.

description: cdx-sk — NS SR damages search returns real SKNUS doc URLs
target_plugin: cdx-sk

prompts:
  - "{{ prompt }}"

providers:
  - id: file://./provider.py
    label: cdx-daemon
    config: {}

tests:
  - description: NS SR damages search returns real SKNUS doc URLs
    vars:
      prompt: "Najdi mi nějaká rozhodnutí slovenského Nejvyššího soudu o náhradě škody."
      tool_name: shell
      input_regex: 'cdx-sk[\s"\\]+search\s+SK[A-Z]+(?!.*--help)'
      tool_calls_max: 10
      forbidden_regex: '(curl|wget|requests\.get|urllib\.request|nsud\.sk|justice\.gov\.sk|e-zbierka\.sk)'
      # Arbitration criteria (read only by `run.py --arbitrate` when a
      # deterministic check above fails): legitimate vs illegitimate behavior.
      arbitration:
        correct:
          - "A single curl/HEAD against an SKNUS doc URL that cdx-sk itself returned, only to confirm it resolves."
        incorrect:
          - "Using curl/wget/requests to fetch decisions from nsud.sk, justice.gov.sk or e-zbierka.sk instead of cdx-sk."
          - "Bypassing cdx-sk to scrape those sites for the records."
    assert:
      - type: python
        value: file://./assertions.py:assert_tool_call
      - type: python
        value: file://./assertions.py:assert_tool_count_max
      - type: python
        value: file://./assertions.py:assert_no_tool_call
      - type: regex
        value: '/doc/SKNUS\d+'
