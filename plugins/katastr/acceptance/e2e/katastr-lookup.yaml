name: katastr-lookup
description: Verify the katastr skill covers three typical lookup flows against a real stable parcel — basic info, owner (LV), and protection status.

# Deterministic target: parcel č. 1 in k.ú. Moravská Ostrava (ČÚZK 713520).
# Stable cultural-heritage parcel with known stable attributes:
#   - výměra 990 m²
#   - druh pozemku: zastavěná plocha a nádvoří
#   - budova s č.p. 1 stojí na ní
#   - LV 12069
#   - ochrana: nemovitá kulturní památka
# API key is supplied at runtime via `--var katastr_api_key=…` and dropped
# into the per-app env file the CLI reads (lib/katastr_core/settings.py
# loads API_KEY= from $HOME/.cdx/apps/katastr/.env).

setup:
  - upload:
      destination: /home/codexis/.cdx/apps/katastr
      files:
        - path: .env
          content: "API_KEY={{ katastr_api_key }}\n"

steps:
  # 1. basic lookup — verify area and land-type in the same response
  - prompt: "Najdi mi parcelu č. 1 v katastrálním území Moravská Ostrava. Jakou má výměru a druh pozemku?"
    expect:
      tool_call:
        name: shell
        input_matches: "katastr-cli"
      tool_calls_min: 1
      tool_calls_max: 8
      response:
        # Both facts must be in the reply (order-independent).
        matches: "(?s)990.{0,400}zastav|zastav.{0,400}990"

  # 2. owner / LV — natural follow-up; AI may answer from step-1 context
  #    (step-1's API response already includes LV), so no tool_call required.
  - prompt: "A jaké je list vlastnictví (LV) této parcely?"
    expect:
      tool_calls_max: 5
      response:
        contains: "12069"

  # 3. protection status — another natural follow-up.
  - prompt: "Je ta parcela nějak chráněná? Třeba památkově?"
    expect:
      tool_calls_max: 5
      response:
        matches: "(?i)kulturní[ -]?památka"
