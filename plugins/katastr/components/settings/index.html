<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katastr - Nastavení</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <h1>Katastr nemovitostí</h1>
        <p class="subtitle">Nastavení API klíče pro ČÚZK REST API KN</p>
      </header>

      <div id="status" class="status"></div>

      <form id="api-key-form" class="form" autocomplete="off">
        <label for="apiKey">API klíč</label>
        <div class="input-row">
          <input id="apiKey" name="apiKey" type="text" placeholder="Zadejte API klíč" />
          <button type="submit">OK</button>
        </div>
      </form>

      <div id="message" class="message"></div>
    </main>
    <script src="./assets/app.js"></script>
  </body>
</html>
