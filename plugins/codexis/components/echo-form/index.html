<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Echo Form</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <main class="card">
    <header class="header">
      <img src="./assets/logo.svg" alt="logo" class="logo" />
      <div>
        <h1>Echo Form</h1>
        <p class="subtitle">Static component assets served by backend route.</p>
      </div>
    </header>

    <section class="images">
      <img src="./assets/banner.png" alt="banner" class="banner" />
      <img src="./assets/icon.png" alt="icon" class="icon" />
    </section>

    <form id="echo-form" class="form" autocomplete="off">
      <input id="inputText" name="inputText" type="text" placeholder="Type something" />
      <button type="submit">Echo</button>
    </form>

    <p class="result">Echo: <strong id="echo-output">(empty)</strong></p>
    <pre id="json-preview" class="json"></pre>
  </main>
</body>
</html>
