name: cdxctl-skill-crud
description: Verify cdxctl can create, update, and delete a custom skill from stdin.

steps:
  - prompt: |
      Using cdxctl, create a new custom skill from stdin with:
        - name: ee-skill-{{ run_id }}
        - description: "E2E test skill — initial description"
        - body: "# Instructions\n\nThis is an e2e test skill."
      Create it now via stdin without asking for confirmation.
    expect:
      tool_call:
        name: shell
        input_matches: "skill create.{0,200}--stdin"
      response:
        matches: "(?i)created|added"
      state:
        graphql: "{ skills { name description editable deletable sourceKind } }"
        jsonpath: "$.skills[?(@.name == 'ee-skill-{{ run_id }}')]"
        count: 1
        matches_subset:
          description: "E2E test skill — initial description"
          editable: true
          deletable: true

  - prompt: "Using cdxctl, list ONLY the editable/custom skills (not the built-in plugin skills). Tell me the names you see."
    expect:
      tool_call:
        name: shell
        input_matches: "skill list.{0,100}--editable-only"
      response:
        contains: "ee-skill-{{ run_id }}"
      state:
        graphql: "{ skills { name editable } }"
        jsonpath: "$.skills[?(@.editable == true)].name"
        contains: "ee-skill-{{ run_id }}"

  - prompt: "Using cdxctl, update the skill named ee-skill-{{ run_id }} so its description becomes 'E2E test skill — updated'. Use --stdin with the updated markdown."
    expect:
      tool_call:
        name: shell
        input_matches: "skill update"
      response:
        matches: "(?i)updated|changed|modified"
      state:
        graphql: "{ skills { name description } }"
        jsonpath: "$.skills[?(@.name == 'ee-skill-{{ run_id }}')].description"
        equals: "E2E test skill — updated"

  - prompt: "Using cdxctl, delete the skill named ee-skill-{{ run_id }}."
    expect:
      tool_call:
        name: shell
        input_matches: "skill delete"
      response:
        matches: "(?i)delet|remov"
      state:
        graphql: "{ skills { name } }"
        jsonpath: "$.skills[*].name"
        not_contains: "ee-skill-{{ run_id }}"
