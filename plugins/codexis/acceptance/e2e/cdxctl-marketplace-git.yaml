name: cdxctl-marketplace-git
description: Full cdxctl marketplace + plugin lifecycle — add a git marketplace (anthropic/claude-plugins-official), install a plugin (superpowers) from it, uninstall, remove marketplace.

# One cohesive lifecycle. Uses the public claude-plugins-official marketplace
# so nothing from our own marketplace gets polluted with install state.

steps:
  - prompt: "Přidej mi prosím marketplace z tohohle gitu: https://github.com/anthropics/claude-plugins-official.git (větev main)."
    expect:
      tool_call:
        name: shell
        input_matches: "marketplace add.{0,300}--source-type git"
      tool_calls_min: 1
      tool_calls_max: 11   # may need flag discovery + retry
      state:
        graphql: "{ marketplaces { name } }"
        jsonpath: "$.marketplaces[*].name"
        contains: "claude-plugins-official"
    # Capture the dynamic marketplace ID so later steps can query
    # installedPlugins(marketplace: $id).
    capture:
      official_mkt_id:
        graphql: "{ marketplaces { id name } }"
        jsonpath: "$.marketplaces[?(@.name == 'claude-plugins-official')].id"

  - prompt: "Jaké mám marketplace? Je tam claude-plugins-official?"
    expect:
      tool_call:
        name: shell
        input_matches: "marketplace list"
      tool_calls_min: 1
      tool_calls_max: 8
      response:
        contains: "claude-plugins-official"
      state:
        graphql: "{ marketplaces { name } }"
        jsonpath: "$.marketplaces[*].name"
        contains: "claude-plugins-official"

  - prompt: "Nainstaluj mi z marketplace claude-plugins-official plugin superpowers."
    expect:
      tool_call:
        name: shell
        input_matches: "plugin install"
      tool_calls_min: 1
      tool_calls_max: 8
      response:
        contains: "superpowers"
      state:
        graphql: "query($m: ID!){ installedPlugins(marketplace: $m) { name } }"
        variables:
          m: "{{ official_mkt_id }}"
        jsonpath: "$.installedPlugins[*].name"
        contains: "superpowers"

  - prompt: "Odinstaluj plugin superpowers."
    expect:
      tool_call:
        name: shell
        input_matches: "plugin uninstall"
      tool_calls_min: 1
      tool_calls_max: 8
      response:
        contains: "superpowers"
      state:
        graphql: "query($m: ID!){ installedPlugins(marketplace: $m) { name } }"
        variables:
          m: "{{ official_mkt_id }}"
        jsonpath: "$.installedPlugins[*].name"
        not_contains: "superpowers"

  - prompt: "Odeber marketplace claude-plugins-official."
    expect:
      tool_call:
        name: shell
        input_matches: "marketplace remove"
      tool_calls_min: 1
      tool_calls_max: 8
      state:
        graphql: "{ marketplaces { name } }"
        jsonpath: "$.marketplaces[*].name"
        not_contains: "claude-plugins-official"
