name: cdxctl-agent-crud
description: Verify cdxctl can create, update, and delete a custom local agent from stdin.

steps:
  - prompt: |
      Using cdxctl, create a new custom local agent from stdin with:
        - name: ee-agent-{{ run_id }}
        - description: "E2E test agent — initial description"
        - tools: Read, Bash
        - maxTurns: 8
        - body: "You are a custom e2e test agent."
      Create it now via stdin without asking for confirmation.
    expect:
      tool_call:
        name: shell
        input_matches: "agent create.{0,200}--stdin"
      tool_calls_max: 3
      state:
        graphql: "{ agents { name description editable deletable sourceKind } }"
        jsonpath: "$.agents[?(@.name == 'ee-agent-{{ run_id }}')]"
        count: 1
        matches_subset:
          description: "E2E test agent — initial description"
          editable: true
          deletable: true

  - prompt: "Using cdxctl, list ONLY the editable/custom agents (not the built-in plugin agents). Tell me the names you see."
    expect:
      tool_call:
        name: shell
        input_matches: "agent list.{0,100}--editable-only"
      tool_calls_max: 3
      response:
        contains: "ee-agent-{{ run_id }}"
      state:
        graphql: "{ agents { name editable } }"
        jsonpath: "$.agents[?(@.editable == true)].name"
        contains: "ee-agent-{{ run_id }}"

  - prompt: "Using cdxctl, update the agent named ee-agent-{{ run_id }} so its description becomes 'E2E test agent — updated'. Use --stdin with the updated markdown."
    expect:
      tool_call:
        name: shell
        input_matches: "agent update"
      tool_calls_max: 3
      state:
        graphql: "{ agents { name description } }"
        jsonpath: "$.agents[?(@.name == 'ee-agent-{{ run_id }}')].description"
        equals: "E2E test agent — updated"

  - prompt: "Using cdxctl, delete the agent named ee-agent-{{ run_id }}."
    expect:
      tool_call:
        name: shell
        input_matches: "agent delete"
      tool_calls_max: 3
      state:
        graphql: "{ agents { name } }"
        jsonpath: "$.agents[*].name"
        not_contains: "ee-agent-{{ run_id }}"
