name: cdxctl-marketplace-local
description: Verify cdxctl can add a LOCAL marketplace (directory on disk) and remove it.

# The runner uploads a minimal marketplace folder into the VM before the chat
# starts, so the test itself is strictly about cdxctl — not about having the
# AI create setup files. See `setup:` below.

setup:
  - upload:
      destination: /home/codexis/ee-mkt-{{ run_id }}
      files:
        - path: .claude-plugin/marketplace.json
          content: |
            {"name": "ee-mkt-{{ run_id }}", "uuid": "00000000-0000-0000-0000-{{ run_id }}{{ run_id }}{{ run_id }}", "plugins": []}

steps:
  - prompt: "Using cdxctl, add the local marketplace located at /home/codexis/ee-mkt-{{ run_id }} (use --source-type local)."
    expect:
      tool_call:
        name: shell
        input_matches: "marketplace add.{0,200}--source-type local"
      tool_calls_max: 3
      state:
        graphql: "{ marketplaces { name } }"
        jsonpath: "$.marketplaces[*].name"
        contains: "ee-mkt-{{ run_id }}"

  - prompt: "Using cdxctl, list all marketplaces and tell me whether ee-mkt-{{ run_id }} is present."
    expect:
      tool_call:
        name: shell
        input_matches: "marketplace list"
      tool_calls_max: 3
      response:
        contains: "ee-mkt-{{ run_id }}"
      state:
        graphql: "{ marketplaces { name } }"
        jsonpath: "$.marketplaces[*].name"
        contains: "ee-mkt-{{ run_id }}"

  - prompt: "Using cdxctl, remove the marketplace named ee-mkt-{{ run_id }}. Find its ID first."
    expect:
      tool_call:
        name: shell
        input_matches: "marketplace remove"
      tool_calls_max: 5
      state:
        graphql: "{ marketplaces { name } }"
        jsonpath: "$.marketplaces[*].name"
        not_contains: "ee-mkt-{{ run_id }}"
