name: cdxctl-automation-command
description: Verify cdxctl creates, triggers, and deletes a COMMAND-type automation (shell command on cron) with correct fields, end-to-end.

# Per-step axes:
#   tool_call — did the AI invoke the right cdxctl subcommand?
#   state     — does the daemon's ground truth match? (primary oracle)
#   response  — only on list/answer steps where the response text IS the product;
#               omitted for pure mutations (state proves the outcome).

steps:
  - prompt: "Using cdxctl, create an automation with title e2e-{{ run_id }}, cron '0 0 1 1 *' (once a year), and command 'echo hello'. Just create it — do not ask for confirmation."
    expect:
      tool_call:
        name: shell
        input_matches: "automation create-command.{0,500}e2e-"
      state:
        graphql: "{ automations { title cron command enabled } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')]"
        count: 1
        matches_subset:
          cron: "0 0 1 1 *"
          command: "echo hello"
          enabled: true

  - prompt: "Using cdxctl, list my automations and tell me the title of the one you just created."
    expect:
      tool_call:
        name: shell
        input_matches: "automation list"
      response:
        contains: "e2e-{{ run_id }}"
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        contains: "e2e-{{ run_id }}"

  - prompt: "Using cdxctl, trigger the automation whose title is e2e-{{ run_id }}. Find its ID first if you need to."
    expect:
      tool_call:
        name: shell
        input_matches: "trigger"
      state:
        graphql: "{ automations { title lastRun { status trigger errorMessage } } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')].lastRun"
        matches_subset:
          status: "COMPLETED"
          trigger: "MANUAL"
          errorMessage: null

  - prompt: "Using cdxctl, delete the automation with title e2e-{{ run_id }}. Find its ID first if you need to."
    expect:
      tool_call:
        name: shell
        input_matches: "delete|remove"
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')]"
        count: 0

  - prompt: "Using cdxctl, list automations once more. Is any automation titled e2e-{{ run_id }} still present? Answer clearly."
    expect:
      tool_call:
        name: shell
        input_matches: "automation list"
      response:
        contains: "e2e-{{ run_id }}"    # AI names what it's answering about
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        not_contains: "e2e-{{ run_id }}"
