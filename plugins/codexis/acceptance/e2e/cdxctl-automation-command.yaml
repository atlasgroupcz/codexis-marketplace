name: cdxctl-automation-command
description: Verify cdxctl creates, triggers, and deletes a COMMAND-type automation (shell command on cron) with correct fields, end-to-end.

# Per-step axes:
#   tool_call — did the AI invoke the right cdxctl subcommand?
#   state     — does the daemon's ground truth match? (primary oracle)
#   response  — only on list/answer steps where the response text IS the product;
#               omitted for pure mutations (state proves the outcome).
#
# Prompts are natural Czech-user language. No mentions of cdxctl or flags —
# the AI has to route via the skill description on its own.

steps:
  - prompt: "Vytvoř automatizaci e2e-{{ run_id }}, která 1. ledna jednou ročně spustí 'echo hello'."
    expect:
      tool_call:
        name: shell
        input_matches: "automation create-command.{0,500}e2e-"
      tool_calls_min: 1
      tool_calls_max: 4   # readFile (lookup cdxctl syntax) + create + slack for 1–2 retries
      state:
        graphql: "{ automations { title cron command enabled } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')]"
        count: 1
        matches_subset:
          cron: "0 0 1 1 *"
          command: "echo hello"
          enabled: true

  - prompt: "Jaké mám automatizace?"
    expect:
      tool_call:
        name: shell
        input_matches: "automation list"
      tool_calls_min: 1
      tool_calls_max: 2
      response:
        contains: "e2e-{{ run_id }}"
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        contains: "e2e-{{ run_id }}"

  - prompt: "Spusť teď automatizaci e2e-{{ run_id }}."
    expect:
      tool_call:
        name: shell
        input_matches: "trigger"
      tool_calls_min: 1
      tool_calls_max: 3    # list (find id) + trigger + 1 slack
      state:
        graphql: "{ automations { title lastRun { status trigger errorMessage } } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')].lastRun"
        matches_subset:
          status: "COMPLETED"
          trigger: "MANUAL"
          errorMessage: null

  - prompt: "Smaž automatizaci e2e-{{ run_id }}."
    expect:
      tool_call:
        name: shell
        input_matches: "delete|remove"
      tool_calls_min: 1
      tool_calls_max: 3    # list (find id) + delete + 1 slack
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')]"
        count: 0

  - prompt: "Je automatizace e2e-{{ run_id }} ještě naplánovaná?"
    expect:
      tool_call:
        name: shell
        input_matches: "automation list"
      tool_calls_min: 1
      tool_calls_max: 2
      response:
        contains: "e2e-{{ run_id }}"    # AI names what it's answering about
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        not_contains: "e2e-{{ run_id }}"
