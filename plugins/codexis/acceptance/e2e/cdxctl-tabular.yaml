name: cdxctl-tabular
description: Verify cdxctl can define columns, run tabular extraction against files in a folder, and return results.

# Tabular extraction workflow:
#   DRAFT state → add columns → start → RUNNING → DONE → rows with cell values
#
# This test uses ONE small file and ONE column so the backend AI extraction
# completes in well under two minutes. Still costs real LLM tokens on the
# daemon side — this is the most expensive cdxctl test.

steps:
  - prompt: |
      Set up a scratch folder for tabular extraction:
        1. mkdir -p /tmp/ee-tab-{{ run_id }}
        2. Write the following content to /tmp/ee-tab-{{ run_id }}/invoice.txt
           (exactly this text, single line):
             Customer: John Doe. Invoice total: $250. Paid in full.
    expect:
      tool_call:
        name: shell
        input_matches: "ee-tab-{{ run_id }}"

  - prompt: "Using cdxctl, add a column to the tabular extraction at /tmp/ee-tab-{{ run_id }}: name='customer', col-type=text, description='The customer full name from the invoice'."
    expect:
      tool_call:
        name: shell
        input_matches: "tabular add-column"
      state:
        graphql: 'query($f: String!){ tabularExtraction(folder: $f) { columns { name } status } }'
        variables:
          f: "/tmp/ee-tab-{{ run_id }}"
        jsonpath: "$.tabularExtraction.columns[*].name"
        contains: "customer"

  - prompt: "Using cdxctl, start the tabular extraction on /tmp/ee-tab-{{ run_id }}, then poll `cdxctl tabular status /tmp/ee-tab-{{ run_id }}` every ~5 seconds until the status is DONE (or 120 seconds elapse). Tell me when it's done."
    expect:
      tool_call:
        name: shell
        input_matches: "tabular start"
      state:
        graphql: 'query($f: String!){ tabularExtraction(folder: $f) { status progress { totalFiles extractedFiles } } }'
        variables:
          f: "/tmp/ee-tab-{{ run_id }}"
        jsonpath: "$.tabularExtraction.status"
        equals: "DONE"

  - prompt: "Using cdxctl, fetch the tabular results for /tmp/ee-tab-{{ run_id }} and tell me the extracted customer value."
    expect:
      tool_call:
        name: shell
        input_matches: "tabular results"
      response:
        matches: "(?i)john"
      state:
        graphql: 'query($f: String!){ tabularExtraction(folder: $f) { rows { fileName status } } }'
        variables:
          f: "/tmp/ee-tab-{{ run_id }}"
        jsonpath: "$.tabularExtraction.rows[*].status"
        matches: "DONE"
