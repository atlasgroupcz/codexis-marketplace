name: cdxctl-automation-lifecycle
description: Verify cdxctl creates, triggers, and deletes an automation with correct fields, end-to-end.

# Each step is evaluated on three axes that must ALL pass:
#   - tool_call: did the model invoke the right tool with the right command?
#   - response:  did the assistant narrate the outcome consistently?
#   - state:     does the daemon's ground truth (via GraphQL) match expectation?
# Fail-fast: first failing axis stops the chat and writes a transcript.

steps:
  - prompt: "Using cdxctl, create an automation with title e2e-{{ run_id }}, cron '0 0 1 1 *' (once a year), and command 'echo hello'. Just create it — do not ask for confirmation."
    expect:
      tool_call:
        name: shell
        input_matches: "automation create-command.{0,500}e2e-"
      response:
        matches: "(?i)created|added"
      state:
        graphql: "{ automations { title cron command enabled } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')]"
        count: 1
        matches_subset:
          cron: "0 0 1 1 *"
          command: "echo hello"
          enabled: true

  - prompt: "Using cdxctl, list my automations and tell me the title of the one you just created."
    expect:
      tool_call:
        name: shell
        input_matches: "automation list"
      response:
        contains: "e2e-{{ run_id }}"
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        contains: "e2e-{{ run_id }}"

  - prompt: "Using cdxctl, trigger the automation whose title is e2e-{{ run_id }}. Find its ID first if you need to."
    expect:
      tool_call:
        name: shell
        input_matches: "trigger"
      response:
        matches: "(?i)trigger|invoke|complete|ran|started|executed"
      state:
        graphql: "{ automations { title lastRun { status trigger errorMessage } } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')].lastRun"
        matches_subset:
          status: "COMPLETED"
          trigger: "MANUAL"
          errorMessage: null

  - prompt: "Using cdxctl, delete the automation with title e2e-{{ run_id }}. Find its ID first if you need to."
    expect:
      tool_call:
        name: shell
        input_matches: "delete|remove"
      response:
        matches: "(?i)delet|remov"
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[?(@.title == 'e2e-{{ run_id }}')]"
        count: 0

  - prompt: "Using cdxctl, list automations once more. Is any automation titled e2e-{{ run_id }} still present? Answer clearly."
    expect:
      tool_call:
        name: shell
        input_matches: "automation list"
      response:
        matches: "(?i)no|not (present|there|found|listed)|gone|removed|deleted"
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        not_contains: "e2e-{{ run_id }}"
