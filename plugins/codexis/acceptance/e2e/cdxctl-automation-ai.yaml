name: cdxctl-automation-ai
description: Verify cdxctl creates an AI-agent automation (type=AI) using the explorer agent.

# This tests `cdxctl automation create` (the AI-agent variant, distinct from
# `create-command` already covered in cdxctl-lifecycle.yaml). The AI variant
# requires --agent <id>; we use the pre-installed `explorer` agent.
#
# We deliberately do NOT trigger this automation — a trigger runs the prompt
# through a real LLM, which costs real tokens and takes real time. Create +
# state verification + delete is enough to prove the AI create path works.

steps:
  - prompt: "Using cdxctl, list the available agents and tell me the full name and ID of the explorer agent."
    expect:
      tool_call:
        name: shell
        input_matches: "agent list"
      response:
        contains: "explorer"
      state:
        graphql: "{ agents { fullName } }"
        jsonpath: "$.agents[*].fullName"
        contains: "explorer"

  - prompt: |
      Using cdxctl, create an AI-agent automation with:
        - title: ee-ai-{{ run_id }}
        - cron: '0 0 1 1 *'
        - prompt: "Describe the current working directory."
        - agent: explorer
        - max-turns: 5
      Use the `automation create` command (not create-command). Just create it, don't ask for confirmation.
    expect:
      tool_call:
        name: shell
        input_matches: "automation create[^-]"   # matches 'automation create' but NOT 'automation create-command'
      response:
        matches: "(?i)created|added"
      state:
        graphql: "{ automations { title type agentFullName prompt maxTurns enabled } }"
        jsonpath: "$.automations[?(@.title == 'ee-ai-{{ run_id }}')]"
        count: 1
        matches_subset:
          type: "AGENT"
          agentFullName: "explorer"
          prompt: "Describe the current working directory."
          maxTurns: 5
          enabled: true

  - prompt: "Using cdxctl, delete the automation titled ee-ai-{{ run_id }}. Find its ID first if you need to."
    expect:
      tool_call:
        name: shell
        input_matches: "automation delete"
      response:
        matches: "(?i)delet|remov"
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        not_contains: "ee-ai-{{ run_id }}"
