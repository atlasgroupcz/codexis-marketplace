name: cdxctl-automation-ai
description: Verify cdxctl creates an AGENT-type automation (using the explorer agent).

# Tests the AI-agent variant of automation create (distinct from create-command).
# Does NOT trigger — triggering would run the prompt through a real LLM.

steps:
  - prompt: "Jaké mám agenty? Řekni mi full name a ID agenta explorer."
    expect:
      tool_call:
        name: shell
        input_matches: "agent list"
      tool_calls_min: 1
      tool_calls_max: 3
      response:
        contains: "explorer"
      state:
        graphql: "{ agents { fullName } }"
        jsonpath: "$.agents[*].fullName"
        contains: "explorer"

  - prompt: |
      Vytvoř AI automatizaci, která agentem explorer jednou ročně 1. ledna spustí
      prompt "Describe the current working directory." — nastav max-turns na 5 a
      pojmenuj to ee-ai-{{ run_id }}.
    expect:
      tool_call:
        name: shell
        input_matches: "automation create[^-]"   # 'automation create' but NOT 'automation create-command'
      tool_calls_min: 1
      tool_calls_max: 3
      state:
        graphql: "{ automations { title type agentFullName prompt maxTurns enabled } }"
        jsonpath: "$.automations[?(@.title == 'ee-ai-{{ run_id }}')]"
        count: 1
        matches_subset:
          type: "AGENT"
          agentFullName: "explorer"
          prompt: "Describe the current working directory."
          maxTurns: 5
          enabled: true

  - prompt: "Smaž automatizaci ee-ai-{{ run_id }}."
    expect:
      tool_call:
        name: shell
        input_matches: "automation delete"
      tool_calls_min: 1
      tool_calls_max: 5
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        not_contains: "ee-ai-{{ run_id }}"
