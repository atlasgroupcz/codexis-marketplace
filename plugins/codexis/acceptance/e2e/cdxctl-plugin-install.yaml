name: cdxctl-plugin-install
description: Verify cdxctl can install and uninstall a plugin against the daemon.

# {{ marketplace_id }} is set by the runner to the Relay node ID of our
# marketplace. We install data-gouv-fr (small, no binaries, fast) then uninstall.

steps:
  - prompt: "Jaké pluginy jsou dostupné v marketplace codexis-plugins, ale ještě nejsou nainstalovaný? Je tam data-gouv-fr?"
    expect:
      tool_call:
        name: shell
        input_matches: "plugin list.{0,100}--available"
      tool_calls_min: 1
      tool_calls_max: 5
      response:
        contains: "data-gouv-fr"

  - prompt: "Nainstaluj plugin data-gouv-fr."
    expect:
      tool_call:
        name: shell
        input_matches: "plugin install"
      tool_calls_min: 1
      tool_calls_max: 5
      state:
        graphql: "query($m: ID!){ installedPlugins(marketplace: $m) { name } }"
        variables:
          m: "{{ marketplace_id }}"
        jsonpath: "$.installedPlugins[*].name"
        contains: "data-gouv-fr"

  - prompt: "Odinstaluj plugin data-gouv-fr."
    expect:
      tool_call:
        name: shell
        input_matches: "plugin uninstall"
      tool_calls_min: 1
      tool_calls_max: 5
      state:
        graphql: "query($m: ID!){ installedPlugins(marketplace: $m) { name } }"
        variables:
          m: "{{ marketplace_id }}"
        jsonpath: "$.installedPlugins[*].name"
        not_contains: "data-gouv-fr"
