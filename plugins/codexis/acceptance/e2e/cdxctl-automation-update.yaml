name: cdxctl-automation-update
description: Verify cdxctl can partially update an existing automation's fields.

steps:
  - prompt: "Vytvoř automatizaci e2e-upd-{{ run_id }}, která 1. ledna jednou ročně spustí 'echo initial'."
    expect:
      tool_call:
        name: shell
        input_matches: "automation create-command"
      tool_calls_min: 1
      tool_calls_max: 8
      state:
        graphql: "{ automations { title cron command enabled } }"
        jsonpath: "$.automations[?(@.title == 'e2e-upd-{{ run_id }}')]"
        count: 1
        matches_subset:
          cron: "0 0 1 1 *"
          command: "echo initial"
          enabled: true

  - prompt: "U automatizace e2e-upd-{{ run_id }} změň název na e2e-upd-{{ run_id }}-v2 a cron na '0 0 2 2 *'."
    expect:
      tool_call:
        name: shell
        input_matches: "automation update"
      tool_calls_min: 1
      tool_calls_max: 8
      state:
        - graphql: "{ automations { title cron command enabled } }"
          jsonpath: "$.automations[?(@.title == 'e2e-upd-{{ run_id }}-v2')]"
          count: 1
          matches_subset:
            cron: "0 0 2 2 *"
            command: "echo initial"
            enabled: true
        - graphql: "{ automations { title } }"
          jsonpath: "$.automations[*].title"
          not_contains: "e2e-upd-{{ run_id }}"   # old title is gone

  - prompt: "Automatizaci e2e-upd-{{ run_id }}-v2 vypni."
    expect:
      tool_call:
        name: shell
        input_matches: "automation update.{0,500}enabled"
      tool_calls_min: 1
      tool_calls_max: 8
      state:
        graphql: "{ automations { title enabled } }"
        jsonpath: "$.automations[?(@.title == 'e2e-upd-{{ run_id }}-v2')].enabled"
        equals: false

  - prompt: "Smaž automatizaci e2e-upd-{{ run_id }}-v2."
    expect:
      tool_call:
        name: shell
        input_matches: "automation delete"
      tool_calls_min: 1
      tool_calls_max: 8
      state:
        graphql: "{ automations { title } }"
        jsonpath: "$.automations[*].title"
        not_contains: "e2e-upd-{{ run_id }}-v2"
