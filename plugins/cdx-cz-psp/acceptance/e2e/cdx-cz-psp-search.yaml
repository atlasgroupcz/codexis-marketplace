name: cdx-cz-psp-search
description: Verify the cdx-cz-psp skill can search Czech parliamentary documents and legislative proposals.

# Czech Parliament (psp.cz). Two sources:
#   CZPSPDOK — reports, interpellations, EU docs
#   CZPSPPRE — legislative proposals (bills)
# Interpellations about taxes ("daně") are a perennial topic — always
# hits plenty of results.

steps:
  - prompt: "Najdi mi parlamentní dokumenty k interpelacím o daních."
    expect:
      tool_call:
        # AI may invoke via full quoted path; tolerate quote/backslash/space
        # between binary name and subcommand.
        name: shell
        input_matches: "cdx-cz-psp[\\s\"\\\\]+search"
      tool_calls_min: 1
      tool_calls_max: 12
      response:
        matches: "/doc/CZPSPDOK\\d+"

  - prompt: "A jaké tam máme vládní návrhy zákonů k DPH?"
    expect:
      tool_call:
        name: shell
        input_matches: "cdx-cz-psp"
      tool_calls_min: 1
      tool_calls_max: 12
      response:
        matches: "/doc/CZPSPPRE\\d+"
