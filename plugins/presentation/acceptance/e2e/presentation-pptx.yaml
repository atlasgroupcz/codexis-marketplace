name: presentation-pptx
description: Verify the presentation skill builds a real .pptx file on disk via python-pptx (not just talks about it).

# Skill is pure-python with python-pptx via pip. The strongest signal that
# the AI actually built a presentation is the file existing on disk after
# the turn — that's what state.file checks.
#
# We pin the output path in the prompt so the test knows where to look. A
# real user would also typically say "save it as ...", so this is realistic.

steps:
  - prompt: "Udělej mi krátkou 3slide prezentaci o jaru v Praze — titulek, hlavní bod, závěr. Ulož ji jako /home/codexis/jaro-{{ run_id }}.pptx."
    expect:
      tool_call:
        # python-pptx workflow: pip-install + run a python script that
        # writes the .pptx. Either invocation will have "pptx" in the input.
        name: shell
        input_matches: "pptx"
      tool_calls_min: 1
      tool_calls_max: 8
      state:
        file: /home/codexis/jaro-{{ run_id }}.pptx
        type: file
      response:
        # AI should confirm the saved path back to the user.
        contains: ".pptx"
