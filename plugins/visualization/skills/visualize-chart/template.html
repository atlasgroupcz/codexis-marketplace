<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-plugins%2Fvisualization%2Fshared%2Flib%2Fd3.min.js"></script>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-plugins%2Fvisualization%2Fshared%2Flib%2Ftheme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      --viz-bg: #ffffff;
      --viz-text: #1f2937;
      --viz-grid: #e5e7eb;
      --viz-axis: #6b7280;
    }
    .dark {
      --viz-bg: #111827;
      --viz-text: #f9fafb;
      --viz-grid: #374151;
      --viz-axis: #9ca3af;
    }
    body {
      background-color: var(--viz-bg);
      color: var(--viz-text);
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #chart {
      width: 100vw;
      height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .axis path, .axis line {
      stroke: var(--viz-axis);
    }
    .axis text {
      fill: var(--viz-text);
      font-size: 11px;
    }
    .grid line {
      stroke: var(--viz-grid);
      stroke-opacity: 0.5;
    }
    .grid path {
      stroke-width: 0;
    }
    .tooltip {
      position: absolute;
      background: var(--viz-bg);
      border: 1px solid var(--viz-grid);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
  </style>
</head>
<body class="min-h-screen">
  <header class="p-4 border-b border-[var(--viz-grid)]">
    <h1 class="text-xl font-semibold">{{TITLE}}</h1>
  </header>
  <div id="chart"></div>
  <div id="legend" class="legend"></div>
  <div id="tooltip" class="tooltip"></div>

  <script>
    const spec = {{DATA}};
    
    const container = document.getElementById('chart');
    const tooltip = document.getElementById('tooltip');
    const legendContainer = document.getElementById('legend');
    
    const margin = { top: 40, right: 40, bottom: 60, left: 60 };
    const width = Math.min(container.clientWidth, 900) - margin.left - margin.right;
    const height = Math.min(container.clientHeight, 500) - margin.top - margin.bottom;

    const colorScale = d3.scaleOrdinal(d3.schemeCategory10);
    const chartType = spec.chartType || 'bar';
    const options = spec.options || {};
    const showLegend = options.showLegend !== false;

    // Create SVG
    const svg = d3.select('#chart')
      .append('svg')
      .attr('width', width + margin.left + margin.right)
      .attr('height', height + margin.top + margin.bottom)
      .append('g')
      .attr('transform', `translate(${margin.left},${margin.top})`);

    // Render based on chart type
    if (chartType === 'pie') {
      renderPie();
    } else {
      renderCartesian();
    }

    function renderCartesian() {
      const xAxis = spec.xAxis;
      const series = spec.series;
      const data = spec.data;

      // X scale
      const x0 = d3.scaleBand()
        .domain(data.map(d => d[xAxis]))
        .range([0, width])
        .padding(0.2);

      const x1 = d3.scaleBand()
        .domain(series)
        .range([0, x0.bandwidth()])
        .padding(0.05);

      // Y scale
      const yMax = d3.max(data, d => d3.max(series, s => d[s]));
      const y = d3.scaleLinear()
        .domain([0, yMax * 1.1])
        .nice()
        .range([height, 0]);

      // Grid
      svg.append('g')
        .attr('class', 'grid')
        .call(d3.axisLeft(y).tickSize(-width).tickFormat(''));

      // X axis
      svg.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(0,${height})`)
        .call(d3.axisBottom(x0));

      // Y axis
      svg.append('g')
        .attr('class', 'axis')
        .call(d3.axisLeft(y));

      if (chartType === 'bar') {
        // Grouped bars
        const groups = svg.selectAll('.bar-group')
          .data(data)
          .join('g')
          .attr('class', 'bar-group')
          .attr('transform', d => `translate(${x0(d[xAxis])},0)`);

        groups.selectAll('rect')
          .data(d => series.map(s => ({ key: s, value: d[s], category: d[xAxis] })))
          .join('rect')
          .attr('x', d => x1(d.key))
          .attr('y', height)
          .attr('width', x1.bandwidth())
          .attr('height', 0)
          .attr('fill', d => colorScale(d.key))
          .on('mouseover', showTooltip)
          .on('mousemove', moveTooltip)
          .on('mouseout', hideTooltip)
          .transition()
          .duration(500)
          .attr('y', d => y(d.value))
          .attr('height', d => height - y(d.value));
      } else if (chartType === 'line' || chartType === 'area') {
        series.forEach((s, i) => {
          const lineData = data.map(d => ({ x: d[xAxis], y: d[s], series: s }));
          
          if (chartType === 'area') {
            const area = d3.area()
              .x(d => x0(d.x) + x0.bandwidth() / 2)
              .y0(height)
              .y1(d => y(d.y));

            svg.append('path')
              .datum(lineData)
              .attr('fill', colorScale(s))
              .attr('fill-opacity', 0.3)
              .attr('d', area);
          }

          const line = d3.line()
            .x(d => x0(d.x) + x0.bandwidth() / 2)
            .y(d => y(d.y));

          svg.append('path')
            .datum(lineData)
            .attr('fill', 'none')
            .attr('stroke', colorScale(s))
            .attr('stroke-width', 2)
            .attr('d', line);

          // Add dots
          svg.selectAll(`.dot-${i}`)
            .data(lineData)
            .join('circle')
            .attr('class', `dot-${i}`)
            .attr('cx', d => x0(d.x) + x0.bandwidth() / 2)
            .attr('cy', d => y(d.y))
            .attr('r', 5)
            .attr('fill', colorScale(s))
            .on('mouseover', (e, d) => showTooltip(e, { key: d.series, value: d.y, category: d.x }))
            .on('mousemove', moveTooltip)
            .on('mouseout', hideTooltip);
        });
      }

      // Legend
      if (showLegend) {
        series.forEach(s => {
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.innerHTML = `<div class="legend-color" style="background:${colorScale(s)}"></div><span>${s}</span>`;
          legendContainer.appendChild(item);
        });
      }
    }

    function renderPie() {
      const radius = Math.min(width, height) / 2;
      const xAxis = spec.xAxis;
      const valueField = spec.series[0];
      
      const pieG = svg.append('g')
        .attr('transform', `translate(${width/2},${height/2})`);

      const pie = d3.pie()
        .value(d => d[valueField])
        .sort(null);

      const arc = d3.arc()
        .innerRadius(radius * 0.4)
        .outerRadius(radius * 0.8);

      const arcHover = d3.arc()
        .innerRadius(radius * 0.4)
        .outerRadius(radius * 0.85);

      const arcs = pieG.selectAll('.arc')
        .data(pie(spec.data))
        .join('g')
        .attr('class', 'arc');

      arcs.append('path')
        .attr('d', arc)
        .attr('fill', (d, i) => colorScale(d.data[xAxis]))
        .attr('stroke', 'var(--viz-bg)')
        .attr('stroke-width', 2)
        .style('cursor', 'pointer')
        .on('mouseover', function(e, d) {
          d3.select(this).transition().duration(200).attr('d', arcHover);
          showTooltip(e, { key: d.data[xAxis], value: d.data[valueField], category: '' });
        })
        .on('mousemove', moveTooltip)
        .on('mouseout', function() {
          d3.select(this).transition().duration(200).attr('d', arc);
          hideTooltip();
        });

      // Legend
      if (showLegend) {
        spec.data.forEach(d => {
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.innerHTML = `<div class="legend-color" style="background:${colorScale(d[xAxis])}"></div><span>${d[xAxis]}: ${d[valueField]}</span>`;
          legendContainer.appendChild(item);
        });
      }
    }

    function showTooltip(event, d) {
      tooltip.innerHTML = `<strong>${d.key}</strong><br>${d.category ? d.category + ': ' : ''}${d.value}`;
      tooltip.style.opacity = 1;
    }

    function moveTooltip(event) {
      tooltip.style.left = (event.pageX + 10) + 'px';
      tooltip.style.top = (event.pageY - 10) + 'px';
    }

    function hideTooltip() {
      tooltip.style.opacity = 0;
    }
  </script>
</body>
</html>
