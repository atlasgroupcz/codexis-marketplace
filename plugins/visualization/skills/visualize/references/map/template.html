<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Finit.js"></script>
  <script src="/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Fa2ui-adapter.js"></script>
  <link rel="stylesheet" href="/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fskills%2Fvisualize%2Freferences%2Fmap%2Flib%2Fleaflet.min.css">
  <script src="/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fskills%2Fvisualize%2Freferences%2Fmap%2Flib%2Fleaflet.min.js"></script>
  <script src="/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Ftailwind-browser.min.js"></script>
  <style>
    body {
      background-color: var(--background);
      color: var(--foreground);
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
    /* Dark mode map filter */
    .dark #map {
      filter: invert(1) hue-rotate(180deg) brightness(0.95) contrast(0.9);
    }
    .dark .leaflet-popup-content-wrapper,
    .dark .leaflet-popup-tip {
      filter: invert(1) hue-rotate(180deg);
    }
    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }
    .leaflet-popup-content {
      margin: 12px 16px;
    }
    .marker-label {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .marker-popup {
      color: var(--muted-foreground);
      font-size: 13px;
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="map"></div>

  <script>
    // Configure Leaflet default icon paths
    L.Icon.Default.imagePath = '';
    L.Icon.Default.mergeOptions({
      iconUrl: '/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fskills%2Fvisualize%2Freferences%2Fmap%2Flib%2Fimages%2Fmarker-icon.png',
      iconRetinaUrl: '/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fskills%2Fvisualize%2Freferences%2Fmap%2Flib%2Fimages%2Fmarker-icon-2x.png',
      shadowUrl: '/rest/files/download?path=%2Fhome%2Fcodexis%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fskills%2Fvisualize%2Freferences%2Fmap%2Flib%2Fimages%2Fmarker-shadow.png'
    });

    // Process A2UI specification through adapter
    const rawSpec = {{DATA}};
    const { data: spec, errors } = A2UIAdapter.process(rawSpec, { lenient: true });

    if (errors.length > 0) {
      console.error('A2UI Validation Errors:', errors);
    }

    if (!spec) {
      const errorEl = document.createElement('p');
      errorEl.className = 'text-red-500 p-4';
      errorEl.textContent = 'Error: Invalid specification';
      document.getElementById('map').appendChild(errorEl);
      throw new Error('Invalid specification');
    }

    // Initialize map with transformed spec
    const center = spec.center || [50.0755, 14.4378];
    const zoom = spec.zoom || 10;

    const map = L.map('map').setView(center, zoom);

    // Add tile layer (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // Add markers from transformed spec
    const markers = spec.markers || [];
    const markerGroup = L.featureGroup();

    markers.forEach(marker => {
      const m = L.marker([marker.lat, marker.lng]);

      // Create popup content using safe DOM methods
      const popupDiv = document.createElement('div');
      const labelDiv = document.createElement('div');
      labelDiv.className = 'marker-label';
      labelDiv.textContent = marker.label;
      popupDiv.appendChild(labelDiv);

      if (marker.popup) {
        const popupTextDiv = document.createElement('div');
        popupTextDiv.className = 'marker-popup';
        popupTextDiv.textContent = marker.popup;
        popupDiv.appendChild(popupTextDiv);
      }

      m.bindPopup(popupDiv);
      m.addTo(markerGroup);
    });

    markerGroup.addTo(map);

    // Fit bounds if markers exist
    if (markers.length > 1) {
      map.fitBounds(markerGroup.getBounds(), { padding: [50, 50] });
    }

    // Add scale control
    L.control.scale().addTo(map);
  </script>
</body>
</html>
