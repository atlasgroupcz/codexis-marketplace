<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Finit.js"></script>
  <link rel="stylesheet" href="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fskills%2Fvisualize%2Freferences%2Fmap%2Flib%2Fleaflet.min.css">
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fskills%2Fvisualize%2Freferences%2Fmap%2Flib%2Fleaflet.min.js"></script>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Ftailwind-browser.min.js"></script>
  <style>
    body {
      background-color: var(--background);
      color: var(--foreground);
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #map {
      width: 100%;
      height: calc(100vh - 60px);
    }
    /* Dark mode map filter */
    .dark #map {
      filter: invert(1) hue-rotate(180deg) brightness(0.95) contrast(0.9);
    }
    .dark .leaflet-popup-content-wrapper,
    .dark .leaflet-popup-tip {
      filter: invert(1) hue-rotate(180deg);
    }
    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }
    .leaflet-popup-content {
      margin: 12px 16px;
    }
    .marker-label {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .marker-popup {
      color: var(--muted-foreground);
      font-size: 13px;
    }
  </style>
</head>
<body class="min-h-screen">
  <header class="p-4 border-b border-[var(--border)]">
    <h1 class="text-xl font-semibold">{{TITLE}}</h1>
  </header>
  <div id="map"></div>

  <script>
    const spec = {{DATA}};
    
    // Initialize map
    const center = spec.center || [50.0755, 14.4378];
    const zoom = spec.zoom || 10;
    
    const map = L.map('map').setView(center, zoom);

    // Add tile layer (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // Add markers
    const markers = spec.markers || [];
    const markerGroup = L.featureGroup();

    markers.forEach(marker => {
      const m = L.marker([marker.lat, marker.lng]);
      
      // Create popup content
      let popupContent = `<div class="marker-label">${marker.label}</div>`;
      if (marker.popup) {
        popupContent += `<div class="marker-popup">${marker.popup}</div>`;
      }
      
      m.bindPopup(popupContent);
      m.addTo(markerGroup);
    });

    markerGroup.addTo(map);

    // Fit bounds if markers exist
    if (markers.length > 0) {
      if (spec.bounds) {
        map.fitBounds(spec.bounds);
      } else if (markers.length > 1) {
        map.fitBounds(markerGroup.getBounds(), { padding: [50, 50] });
      }
    }

    // Add scale control
    L.control.scale().addTo(map);
  </script>
</body>
</html>
