<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Fd3.min.js"></script>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Finit.js"></script>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Fa2ui-adapter.js"></script>
  <script src="/rest/files/download?path=%2Fhome%2Fuser%2F.cdx%2Fplugins%2Fmarketplaces%2Fcodexis-marketplace%2Fplugins%2Fvisualization%2Fshared%2Flib%2Ftailwind-browser.min.js"></script>
  <style>
    body {
      background-color: var(--background);
      color: var(--foreground);
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #calendar {
      width: 100vw;
      height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      padding: 20px;
    }
    .day {
      stroke: var(--background);
      stroke-width: 1px;
      rx: 2;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .day:hover {
      opacity: 0.8;
    }
    .month-label {
      fill: var(--foreground);
      font-size: 11px;
    }
    .day-label {
      fill: var(--foreground);
      font-size: 10px;
    }
    .tooltip {
      position: absolute;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
      font-size: 11px;
    }
    .legend-cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
  </style>
</head>
<body class="min-h-screen">
  <header class="p-4 border-b border-[var(--border)]">
    <h1 class="text-xl font-semibold">{{TITLE}}</h1>
  </header>
  <div id="calendar"></div>
  <div id="tooltip" class="tooltip"></div>

  <script>
    // Process A2UI specification through adapter
    const rawSpec = {{DATA}};
    const { data: spec, errors } = A2UIAdapter.process(rawSpec, { lenient: true });

    if (errors.length > 0) {
      console.error('A2UI Validation Errors:', errors);
    }

    if (!spec) {
      const errorEl = document.createElement('p');
      errorEl.className = 'text-red-500 p-4';
      errorEl.textContent = 'Error: Invalid specification';
      document.getElementById('calendar').appendChild(errorEl);
      throw new Error('Invalid specification');
    }

    const container = document.getElementById('calendar');
    const tooltip = document.getElementById('tooltip');

    const cellSize = 14;
    const cellPadding = 2;
    const year = spec.year;

    // Helper function to get CSS variable values
    const getColor = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    // Generate color scale from chart variables (empty to filled)
    const emptyColor = window.isDark ? '#161b22' : '#ebedf0';
    const colors = spec.colorScale || [
      emptyColor,
      getColor('--chart-2'), // Teal/green tones work well for contribution graphs
      getColor('--chart-3'),
      getColor('--chart-4'),
      getColor('--chart-1')
    ];

    // Data map is already created by the adapter
    const dataMap = spec.data;

    // Calculate dimensions
    const width = (53 * (cellSize + cellPadding)) + 40;
    const height = (7 * (cellSize + cellPadding)) + 40;

    // Get max value for color scale
    const maxValue = d3.max(Array.from(dataMap.values()), d => d.value) || 1;
    const colorScale = d3.scaleQuantize()
      .domain([0, maxValue])
      .range(colors.slice(1));

    // Create SVG
    const svg = d3.select('#calendar')
      .append('svg')
      .attr('width', width)
      .attr('height', height + 50);

    const g = svg.append('g')
      .attr('transform', 'translate(30, 20)');

    // Day labels
    const dayLabels = ['', 'Mon', '', 'Wed', '', 'Fri', ''];
    g.selectAll('.day-label')
      .data(dayLabels)
      .join('text')
      .attr('class', 'day-label')
      .attr('x', -5)
      .attr('y', (d, i) => i * (cellSize + cellPadding) + cellSize / 2)
      .attr('text-anchor', 'end')
      .attr('dominant-baseline', 'middle')
      .text(d => d);

    // Generate all days of the year
    const startDate = new Date(year, 0, 1);
    const endDate = new Date(year, 11, 31);
    const days = d3.timeDays(startDate, d3.timeDay.offset(endDate, 1));

    // Draw day cells
    g.selectAll('.day')
      .data(days)
      .join('rect')
      .attr('class', 'day')
      .attr('width', cellSize)
      .attr('height', cellSize)
      .attr('x', d => d3.timeWeek.count(d3.timeYear(d), d) * (cellSize + cellPadding))
      .attr('y', d => d.getDay() * (cellSize + cellPadding))
      .attr('fill', d => {
        const dateStr = d.toISOString().split('T')[0];
        const data = dataMap.get(dateStr);
        if (!data || data.value === 0) return colors[0];
        return colorScale(data.value);
      })
      .on('mouseover', (event, d) => {
        const dateStr = d.toISOString().split('T')[0];
        const data = dataMap.get(dateStr);
        const dateFormatted = d.toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
        tooltip.textContent = '';
        const strong = document.createElement('strong');
        strong.textContent = data ? (data.label || String(data.value)) : 'No activity';
        tooltip.appendChild(strong);
        tooltip.appendChild(document.createElement('br'));
        tooltip.appendChild(document.createTextNode(dateFormatted));
        tooltip.style.opacity = 1;
      })
      .on('mousemove', (event) => {
        tooltip.style.left = (event.pageX + 10) + 'px';
        tooltip.style.top = (event.pageY - 10) + 'px';
      })
      .on('mouseout', () => {
        tooltip.style.opacity = 0;
      });

    // Month labels
    const months = d3.timeMonths(startDate, endDate);
    g.selectAll('.month-label')
      .data(months)
      .join('text')
      .attr('class', 'month-label')
      .attr('x', d => d3.timeWeek.count(d3.timeYear(d), d) * (cellSize + cellPadding))
      .attr('y', -5)
      .text(d => d3.timeFormat('%b')(d));

    // Legend
    const legendG = svg.append('g')
      .attr('transform', `translate(30, ${height + 20})`);

    legendG.append('text')
      .attr('class', 'day-label')
      .attr('x', 0)
      .attr('y', 10)
      .text('Less');

    colors.forEach((color, i) => {
      legendG.append('rect')
        .attr('class', 'legend-cell')
        .attr('x', 35 + i * 16)
        .attr('y', 0)
        .attr('width', 12)
        .attr('height', 12)
        .attr('fill', color)
        .attr('rx', 2);
    });

    legendG.append('text')
      .attr('class', 'day-label')
      .attr('x', 35 + colors.length * 16 + 5)
      .attr('y', 10)
      .text('More');
  </script>
</body>
</html>
