name: data-gouv-fr-search
description: Verify the data-gouv-fr skill searches French government open-data datasets (SIRENE — French company registry, a stable flagship dataset).

# data-gouv-fr is served via a remote MCP server (mcp.data.gouv.fr),
# so the tool_call name is an MCP tool (e.g. mcp__data-gouv-fr__search_datasets),
# not a shell command. First run may need loose assertions to discover the
# exact tool-name pattern; will tighten after.

steps:
  - prompt: "Najdi mi na data.gouv.fr datasety související se SIRENE (francouzský registr firem)."
    expect:
      tool_call:
        # Match any MCP tool call from the data-gouv-fr server
        name: "mcp__data-gouv-fr__search_datasets"
      tool_calls_min: 1
      tool_calls_max: 6
      response:
        # Real data.gouv.fr dataset URLs are of the form
        # https://www.data.gouv.fr/fr/datasets/<slug>/ — presence proves real hits.
        matches: "data\\.gouv\\.fr/.{0,50}datasets?"
