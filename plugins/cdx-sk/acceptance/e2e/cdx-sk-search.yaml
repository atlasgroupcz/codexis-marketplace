name: cdx-sk-search
description: Verify the cdx-sk skill performs a court-case search and fetches a specific paragraph of Slovak law.

# Mirrors codexis-search for the Slovak legal database (e-Zbierka + courts).
# Two steps:
#   1. Case-law search (forces `cdx-sk search`; unpredictable IDs).
#   2. Specific paragraph fetch from Občiansky zákonník (40/1964 Zb.) —
#      §3 ("dobrými mravmi") is a stable statutory marker.

steps:
  - prompt: "Najdi mi nějaká rozhodnutí slovenského Nejvyššího soudu o náhradě škody."
    expect:
      tool_call:
        # AI may invoke via full quoted path; tolerate quote/backslash/space
        # between binary name and subcommand.
        name: shell
        input_matches: "cdx-sk[\\s\"\\\\]+search"
      tool_calls_min: 1
      tool_calls_max: 12
      response:
        # Real SKNUS doc links prove the search returned actual hits.
        matches: "/doc/SKNUS\\d+"

  - prompt: "Jak zní §3 slovenského Občianskeho zákonníka (40/1964 Zb.)?"
    expect:
      tool_call:
        name: shell
        input_matches: "cdx-sk"
      tool_calls_min: 1
      tool_calls_max: 8
      response:
        # §3 of SK Občiansky zákonník is the famous "dobré mravy" paragraph.
        matches: "(?i)dobr(ými|ými|ymi)?\\s*mravmi|dobrými mravmi"
