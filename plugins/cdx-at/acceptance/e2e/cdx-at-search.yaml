name: cdx-at-search
description: Verify the cdx-at skill performs case-law search and fetches Austrian federal legislation.

# Austrian legal DB (RIS). Two steps:
#   1. Case-law search on ATJD (Judikatur) for "Schadenersatz" (damages).
#   2. Legislation lookup — ABGB (Allgemeines bürgerliches Gesetzbuch) is
#      the Austrian civil code — must be returned as a hit.

steps:
  - prompt: "Najdi mi 3 rozhodnutí rakouského Nejvyššího soudu (OGH) o náhradě škody (Schadenersatz). Stačí krátký seznam, žádné detailní výpisy."
    expect:
      tool_call:
        name: shell
        input_matches: "cdx-at search"
      tool_calls_min: 1
      tool_calls_max: 8   # explicit scope to list, not fetch doc metas
      response:
        # Real ATJD doc links — proves the search returned real hits,
        # not just a confirmation that AI understood the topic.
        matches: "/doc/ATJD\\d+"

  - prompt: "Najdi mi rakouský občanský zákoník (ABGB)."
    expect:
      tool_call:
        name: shell
        input_matches: "cdx-at"
      tool_calls_min: 1
      tool_calls_max: 8
      response:
        # ABGB lives in ATHI (consolidated history) or ATBR depending on how
        # the AI resolves it; either source is a valid real hit.
        matches: "/doc/(ATBR|ATHI)\\d+"
