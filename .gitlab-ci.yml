# .gitlab-ci.yml — plugin-e2e job
#
# NOTE: This job assumes the wider CI pipeline already:
#   1. Builds the merge-result branch on the remote.
#   2. Spins up an ephemeral cdx-daemon and waits for /actuator/health.
#   3. Exposes DAEMON_URL and SERVICE_JWT as CI/CD variables.
#
# If the existing pipeline is structured differently (e.g. the daemon is
# started in a preceding job in this same file), adjust `needs:` to match.
# See test-marketplace.py and its pipeline job for the parallel existing
# convention.

stages:
  - test

plugin-e2e:
  stage: test
  image: python:3.11-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git
    - pip install -e '.[dev]'
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --depth=50
  script:
    - mkdir -p test-results
    - pytest tests/test-plugin-e2e.py
        --daemon    "$DAEMON_URL"
        --token     "$SERVICE_JWT"
        --git-url   "$CI_REPOSITORY_URL"
        --git-ref   "$CI_MERGE_REQUEST_REF_PATH"
        --base-ref  "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --changed
        --junitxml=test-results/plugin-e2e-junit.xml
        -v
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  artifacts:
    when: always
    paths:
      - test-results/
    reports:
      junit: test-results/plugin-e2e-junit.xml
